<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ELogbook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-left">
        <h2>E-Logbook PKL/Magang</h2>
        <p>Aplikasi E-logbook untuk PKL dan Magang Mahasiswa</p>
        
        <img src="logo-polije.png" alt="Logo" class="img-fluid" style="max-width: 200px;">
        
        <h4 class="mt-3">Selamat Datang</h4>
    </div>

    <div class="login-right">
        <div class="login-card">
            <h4 class="text-center">E-logbook Magang PKL</h4>
            <p class="text-center text-muted">Politeknik Negeri Jember</p>
            
            <form>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Masukkan Email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Password">
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3" style="background-color: #002855;">Login</button>
            </form>
            
            <p class="text-center">Atau</p>
            
            <button class="btn btn-outline-dark w-100">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" 
                     alt="Google" style="width: 20px; margin-right: 10px;">
                Sign in with Google
            </button>
        </div>
    </div>
</div>

</body>
</html>
